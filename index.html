<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Максим & Анна</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="scene">

    <div class="envelope">

        <img
        src="6CD5ABCC-605C-42B7-9927-D6E80EED8A81.png"
        alt="Конверт">

        <div class="seal"
        id="seal">

            <span>
                Это<br>
                по любви
            </span>

        </div>

        <div class="hint">

            Коснитесь печати

        </div>

    </div>

</div>

<div class="inside-message">

    Для тех, кого мы очень ждём
    в этот день.

</div>

<div class="letter">

    <div class="paper">

        <h1>

            Дорогие родные и друзья!

        </h1>

        <p>

            Мы будем счастливы разделить
            с вами самый важный день нашей
            жизни.

        </p>

        <p>

            Приглашаем вас стать частью
            этого особенного момента.

        </p>

        <button>

            Разделить этот день с нами

        </button>

    </div>

</div>

<div class="made">

Создано с любовью

</div>

<script src="script.js"></script>

</body>

</html>
